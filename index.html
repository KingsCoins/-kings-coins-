<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
            font-family: 'Arial', sans-serif;
            color: white;
        }
        .slot-machine {
            border: 5px solid #f39c12;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .reels {
            animation: spin 2s infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .emoji {
            font-size: 3rem;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="slot-machine">
        <h1>Welcome to the Slot Machine!</h1>
        <div class="reels">
            <span class="emoji">🍒</span>
            <span class="emoji">🍋</span>
            <span class="emoji">🍊</span>
        </div>
        <div class="stats-bar">
            <div>Balance: <span id="balance">1000</span></div>
            <div>Bet: <span id="bet">10</span></div>
            <div>Wins: <span id="wins">0</span></div>
        </div>
        <button id="spinButton">Spin</button>
        <div id="tournamentBanner">Tournament: Win Big!</div>
        <div id="coinShop">
            <h2>Coin Shop</h2>
            <ul>
                <li>100 coins - $1.00</li>
                <li>500 coins - $4.50</li>
                <li>1000 coins - $8.00</li>
            </ul>
        </div>
        <div id="gameHistory">History: </div>
        <div id="winPopup" style="display:none;">You Win!</div>
    </div>
    <script>
        // Game mechanics and localStorage persistence code will go here.
        document.getElementById('spinButton').addEventListener('click', function() {
            // Spin the reels and update stats
            // Implement game logic
        });
    </script>
</body>
</html>
